# docker-compose.yaml

version: '3.9'

services:
  app:
    image: hailo_dfc:latest
    build:
      context: .
      dockerfile: Dockerfile
    shm_size: '16g'
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
